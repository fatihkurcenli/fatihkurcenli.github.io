name: Deploy Next.js site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project type
        id: project
        run: |
          if [ -f package.json ]; then
            echo "has_next_source=true" >> "$GITHUB_OUTPUT"
            echo "publish_path=./out" >> "$GITHUB_OUTPUT"
          else
            echo "has_next_source=false" >> "$GITHUB_OUTPUT"
            echo "publish_path=." >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.project.outputs.has_next_source == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.project.outputs.has_next_source == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        if: steps.project.outputs.has_next_source == 'true'
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.project.outputs.publish_path }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
